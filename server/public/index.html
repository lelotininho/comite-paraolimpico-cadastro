<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro Comitê Paralímpico</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    label { display: block; margin-top: 12px; }
    input, select { padding: 8px; width: 300px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; }
    .toast-success { color: #155724; background: #d4edda; padding: 12px; margin-top: 16px; border-radius: 4px; }
    .field-error { color: #721c24; margin-top: 4px; }
    .user-category { margin-top: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Cadastro Comitê Paralímpico</h1>

  <form id="registration-form" novalidate>
    <label for="nome">Nome</label>
    <input id="nome" name="nome" type="text" />
    <div class="field-error" data-for="nome"></div>

    <label for="cpf">CPF</label>
    <input id="cpf" name="cpf" type="text" />
    <div class="field-error" for="cpf"></div>

    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" />
    <div class="field-error" for="email"></div>

    <label for="telefone">Telefone</label>
    <input id="telefone" name="telefone" type="tel" />
    <div class="field-error" for="telefone"></div>

    <label for="categoria">Categoria</label>
    <select id="categoria" name="categoria">
      <option value="atleta">Atleta</option>
      <option value="representante">Representante</option>
    </select>
    <div class="field-error" data-for="categoria"></div>

    <button id="btn-enviar" type="submit">Enviar</button>
  </form>

  <div class="toast-success" style="display:none"></div>
  <div class="user-category" style="display:none"></div>

  <script>
    const form = document.getElementById('registration-form');
    const toast = document.querySelector('.toast-success');
    const userCategory = document.querySelector('.user-category');

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
      toast.style.display = 'none';
      userCategory.style.display = 'none';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearErrors();
      const data = {
        nome: document.getElementById('nome').value,
        cpf: document.getElementById('cpf').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        categoria: document.getElementById('categoria').value,
      };

      const response = await fetch('/api/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      const body = await response.json();
      if (response.ok) {
        toast.textContent = body.message || 'Cadastro realizado com sucesso';
        toast.style.display = 'block';
        userCategory.textContent = body.categoria === 'representante' ? 'Representante' : 'Atleta';
        userCategory.style.display = 'block';
      } else {
        if (body.error) {
          if (body.error.includes('CPF')) {
            document.querySelector('.field-error[for="cpf"]').textContent = body.error;
          }
          if (body.error.includes('e-mail')) {
            document.querySelector('.field-error[for="email"]').textContent = body.error;
          }
        }
      }
    });
  </script>
</body>
</html>
